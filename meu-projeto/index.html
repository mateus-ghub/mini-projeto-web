<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CineBusca</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🎬 CineBusca</h1>
</header>

<div class="container">

  <p class="descricao">
    Este site tem como objetivo oferecer a busca de pôsteres de filmes de forma fácil e interativa.
    Criado por Mateus Santos, encontre o pôster do seu filme preferido em poucos segundos!
  </p>

  <input type="text" id="busca" placeholder="Digite o nome do filme">
  <button onclick="buscar()">Buscar</button>

  <div id="resultados"></div>

</div>

<footer>
  <p>Projeto desenvolvido por Mateus Santos • Integração com API de filmes</p>
</footer>

<script src="script.js"></script>

</body>
</html>
